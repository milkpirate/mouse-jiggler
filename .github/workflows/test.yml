name: test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install task
        uses: go-task/setup-task@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test
        run: task test

      - name: Test Summary
        id: test_summary
        uses: test-summary/action@v2
        with:
          paths: reports/junit_test_report.xml
          show: "fail, skip"
        if: always()

      - name: Coverage Report (on PRs)
        uses: xportation/junit-coverage-report@main
        with:
          junit-path: reports/junit_test_report.xml
          coverage-path: reports/coverage/junit_cov_report.xml
        if: always()

      - name: Upload reports
        uses: actions/upload-artifact@v6
        with:
          name: mouse-jiggler-test_reports
          path: reports/
        if: always()
