# "toml" file for settings.
# See https://docs.circuitpython.org/en/latest/docs/environment.html for more info on how to use this file.

# Hardware settings
drive_flag_file = "usb_drive.enable"
serial_drive_enable_command = "enable_usb_reboot"
button_pin = "GP28"
# 1 = active high, 0 = active low
button_activation = 0

# Ticker settings
# 5 minutes
tickle_interval = 300
# px to move the mouse cursor when tickling
jiggle_distance = 1

# Host settings
circuit_python_drive_location = "G:\\"
